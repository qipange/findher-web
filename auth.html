<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FindHer - 用户认证</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }
        
        .auth-header {
            margin-bottom: 30px;
        }
        
        .auth-header h1 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .auth-header p {
            color: #666;
            font-size: 16px;
        }
        
        .auth-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px 24px;
            background: #4285f4;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: background-color 0.3s ease;
            margin: 10px;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        
        .auth-button:hover {
            background: #3367d6;
        }
        
        .auth-button.google {
            background: #4285f4;
        }
        
        .auth-button.google:hover {
            background: #3367d6;
        }
        
        .user-info {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
        }
        
        .user-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: block;
        }
        
        .user-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .user-email {
            color: #666;
            font-size: 14px;
            margin-bottom: 15px;
        }
        
        .logout-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .logout-btn:hover {
            background: #c82333;
        }
        
        .loading {
            display: none;
        }
        
        .error {
            color: #dc3545;
            margin: 10px 0;
            padding: 10px;
            border-radius: 4px;
            background: #f8d7da;
            border: 1px solid #f5c6cb;
        }
        
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            color: #4285f4;
            text-decoration: none;
            margin-bottom: 20px;
        }
        
        .back-btn:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="auth-container">
            <a href="/" class="back-btn">← 返回主页</a>
            
            <div class="auth-header">
                <h1>FindHer</h1>
                <p>安全的位置共享服务</p>
            </div>
            
            <div id="loading" class="loading">
                <p>正在检查登录状态...</p>
            </div>
            
            <div id="login-section">
                <h2>欢迎使用 FindHer</h2>
                <p>请使用您的 Google 账户登录，以获得更好的使用体验。</p>
                
                <button id="login-btn" class="auth-button google">
                    <svg width="20" height="20" viewBox="0 0 24 24">
                        <path fill="#fff" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#fff" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#fff" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#fff" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    使用 Google 登录
                </button>
                
                <div id="error" class="error" style="display: none;"></div>
            </div>
            
            <div id="user-section" style="display: none;">
                <div class="user-info">
                    <img id="user-avatar" class="user-avatar" src="" alt="用户头像">
                    <div id="user-name" class="user-name"></div>
                    <div id="user-email" class="user-email"></div>
                    <button id="logout-btn" class="logout-btn">退出登录</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 检查用户认证状态
        async function checkAuthStatus() {
            try {
                const response = await fetch('/api/auth/check');
                const data = await response.json();
                
                if (data.authenticated) {
                    // 用户已登录，获取用户信息
                    const userResponse = await fetch('/api/user');
                    const userData = await userResponse.json();
                    
                    if (userData.authenticated && userData.user) {
                        showUserSection(userData.user);
                    }
                }
            } catch (error) {
                console.error('检查认证状态失败:', error);
            }
        }

        // 显示用户信息
        function showUserSection(user) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('user-section').style.display = 'block';
            document.getElementById('user-avatar').src = user.picture;
            document.getElementById('user-name').textContent = user.name;
            document.getElementById('user-email').textContent = user.email;
        }

        // 显示登录部分
        function showLoginSection() {
            document.getElementById('login-section').style.display = 'block';
            document.getElementById('user-section').style.display = 'none';
        }

        // Google登录
        document.getElementById('login-btn').addEventListener('click', () => {
            window.location.href = '/api/auth/google';
        });

        // 退出登录
        document.getElementById('logout-btn').addEventListener('click', async () => {
            try {
                const response = await fetch('/api/auth/logout', {
                    method: 'POST'
                });
                const data = await response.json();
                
                if (data.success) {
                    showLoginSection();
                    // 重定向到主页
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1000);
                }
            } catch (error) {
                console.error('登出失败:', error);
                showError('登出失败，请重试');
            }
        });

        // 显示错误信息
        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        // 页面加载时检查认证状态
        document.addEventListener('DOMContentLoaded', () => {
            checkAuthStatus();
        });
    </script>
</body>
</html>
